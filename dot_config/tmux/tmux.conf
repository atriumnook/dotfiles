# ==========================================================
# tmux 設定 — Zellij ライクなガイド付きレイアウト
# ==========================================================

# -- ターミナル & カラー --
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"

# -- 基本設定 --
set -g default-shell /usr/bin/zsh
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g word-separators ",|`:\"' ()[]{}<>\t"

# -- プレフィックス: Ctrl+a --
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# -- ペインナビゲーション: 矢印キー --
bind Up    select-pane -U
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R

# Alt+矢印: プレフィックスなしでペイン移動
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R

# -- ペインリサイズ: prefix + Shift+矢印（連続操作可） --
bind -r S-Up    resize-pane -U 3
bind -r S-Down  resize-pane -D 3
bind -r S-Left  resize-pane -L 3
bind -r S-Right resize-pane -R 3

# -- ウィンドウ & ペイン操作 --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# -- 設定リロード --
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# -- vim-tmux-navigator (Neovim ペイン連携) --
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# prefix + C-l でクリアスクリーン（vim-tmux-navigator 公式推奨）
bind C-l send-keys 'C-l'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# -- コピーモード (vi スタイル) --
# 方針:
#   1. OSC 52 (set-clipboard on) でモダンなターミナルはネイティブ対応
#   2. フォールバック: ~/.config/tmux/tmux-clipboard-copy.sh でプラットフォーム自動検出
#
# マウス選択は dolkow 方式を採用（tmux 3.5a 以上が必要）:
#   https://github.com/tmux/tmux/issues/4272
#   - ドラッグで選択 → リリースでコピー（選択状態を維持）
#   - ダブルクリック + ドラッグ → 単語単位で選択範囲を拡張
#   - トリプルクリック + ドラッグ → 行単位で選択範囲を拡張
#   - シングルクリック → 選択解除（最下部にいる場合のみコピーモード終了）
#   - 最下部までスクロール → コピーモード自動終了

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection

# -- キーボードでヤンク --
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "~/.config/tmux/tmux-clipboard-copy.sh"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "~/.config/tmux/tmux-clipboard-copy.sh"

# -- マウス選択（dolkow 方式） --
unbind -T root         DoubleClick1Pane
unbind -T copy-mode    DoubleClick1Pane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T root         MouseDrag1Pane
unbind -T copy-mode    MouseDrag1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T root         TripleClick1Pane
unbind -T copy-mode    TripleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane
unbind -T root         MouseDragEnd1Pane
unbind -T copy-mode    MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# 選択開始
bind -T root         MouseDrag1Pane   copy-mode -M \; send-keys -X begin-selection
bind -T root         SecondClick1Pane copy-mode -M \; send-keys -X select-word
bind -T root         TripleClick1Pane                 send-keys -X select-line

# コピー（リリース時、選択を維持したままコピー）
bind -T copy-mode    MouseUp1Pane      send-keys -X copy-pipe-no-clear "~/.config/tmux/tmux-clipboard-copy.sh"
bind -T copy-mode-vi MouseUp1Pane      send-keys -X copy-pipe-no-clear "~/.config/tmux/tmux-clipboard-copy.sh"
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "~/.config/tmux/tmux-clipboard-copy.sh"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "~/.config/tmux/tmux-clipboard-copy.sh"

# クリックで選択解除（スクロール中でない場合のみコピーモード終了）
bind -T copy-mode    MouseDown1Pane if-shell -F "#{scroll_position}" '' 'send-keys -X cancel'
bind -T copy-mode-vi MouseDown1Pane if-shell -F "#{scroll_position}" '' 'send-keys -X cancel'

# 中クリックでペースト
bind -T copy-mode    MouseDown2Pane send-keys -X cancel \; paste-buffer
bind -T copy-mode-vi MouseDown2Pane send-keys -X cancel \; paste-buffer

# 最下部までスクロールしたらコピーモード自動終了
bind-key -T copy-mode-vi WheelDownPane \
  if-shell -F "#{?#{==:#{scroll_position},0},1,0}" \
    "send-keys -X cancel" \
    "send-keys -X scroll-down"

# -- Cmd キーパススルー（Ghostty / WezTerm / Kitty 向け） --
set -s user-keys[0] "\e[112;9~"
set -s user-keys[1] "\e[70;10~"
set -s user-keys[2] "\e[80;10~"
set -s user-keys[3] "\e[98;9~"
set -s user-keys[4] "\e[47;9~"
set -s user-keys[5] "\e[96;9~"
set -s user-keys[6] "\e[106;9~"
set -s user-keys[7] "\e[74;10~"

bind-key -n User0 send-keys -l "\e[112;9u"
bind-key -n User1 send-keys -l "\e[70;10u"
bind-key -n User2 send-keys -l "\e[80;10u"
bind-key -n User3 send-keys -l "\e[98;9u"
bind-key -n User4 send-keys -l "\e[47;9u"
bind-key -n User5 send-keys -l "\e[96;9u"
bind-key -n User6 send-keys -l "\e[106;9u"
bind-key -n User7 send-keys -l "\e[74;10u"

# ==========================================================
# Catppuccin Mocha パレット（プラグインなし、直接カラー指定）
# ==========================================================
# https://catppuccin.com/palette
%hidden CTP_BASE="#1e1e2e"
%hidden CTP_MANTLE="#181825"
%hidden CTP_CRUST="#11111b"
%hidden CTP_SURFACE0="#313244"
%hidden CTP_SURFACE1="#45475a"
%hidden CTP_SURFACE2="#585b70"
%hidden CTP_OVERLAY0="#6c7086"
%hidden CTP_TEXT="#cdd6f4"
%hidden CTP_SUBTEXT0="#a6adc8"
%hidden CTP_SUBTEXT1="#bac2de"
%hidden CTP_GREEN="#a6e3a1"
%hidden CTP_BLUE="#89b4fa"
%hidden CTP_PEACH="#fab387"
%hidden CTP_YELLOW="#f9e2af"
%hidden CTP_MAUVE="#cba6f7"

# ==========================================================
# ステータスバー — Zellij スタイルのフラットレイアウト
# ==========================================================
#
# Zellij 参考レイアウト:
# ┌──────────────────────────────────────────────────────────┐
# │Ctrl +  <g> LOCK  <p> PANE  <t> TAB  <n> RESIZE  ...    │
# └──────────────────────────────────────────────────────────┘
#
# 再現ルール:
#   - フラット単色背景（Powerline 矢印なし）
#   - キーは <山括弧> で囲み、緑・太字
#   - アクションラベルはミュートグレー・大文字
#   - ヒント左端にプレフィックスを一度だけ表示

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=$CTP_MANTLE,fg=$CTP_SUBTEXT0"

# -- 左: セッション名 + ウィンドウタブ --
set -g status-left-length 30
set -g status-left "#[bg=$CTP_MAUVE,fg=$CTP_CRUST,bold]  #S #[bg=$CTP_MANTLE]  "

# -- ウィンドウタブ（フラット） --
set -g window-status-separator ""
set -g window-status-format         "#[bg=$CTP_MANTLE,fg=$CTP_OVERLAY0]  #I:#W  "
set -g window-status-current-format "#[bg=$CTP_SURFACE0,fg=$CTP_BLUE,bold]  #I:#W #[fg=$CTP_BLUE]• "

# -- 右: キーバインドヒント（レスポンシブ、Zellij スタイル） --
# 広い  (>=160列): <key> アイコン ラベル（フルガイド）
# 中間  (>=120列): <key> アイコン（コンパクト）
# 狭い  ( <120列): アイコンのみ（ミニマル）
set -g status-right-length 200
set -g status-right "#{?#{>=:#{client_width},120},#[fg=$CTP_PEACH]#[bold]Ctrl+a #[fg=$CTP_SURFACE2]│ ,}#{?#{>=:#{client_width},160},#[fg=$CTP_GREEN]#[bold]<c>#[fg=$CTP_SUBTEXT1]#[nobold]  WIN  ,#{?#{>=:#{client_width},120},#[fg=$CTP_GREEN]#[bold]<c>#[fg=$CTP_SUBTEXT1]#[nobold]   ,#[fg=$CTP_SUBTEXT1] }}#{?#{>=:#{client_width},160},#[fg=$CTP_GREEN]#[bold]<|>#[fg=$CTP_SUBTEXT1]#[nobold]  VSPLIT  ,#{?#{>=:#{client_width},120},#[fg=$CTP_GREEN]#[bold]<|>#[fg=$CTP_SUBTEXT1]#[nobold]   ,#[fg=$CTP_SUBTEXT1] }}#{?#{>=:#{client_width},160},#[fg=$CTP_GREEN]#[bold]<->#[fg=$CTP_SUBTEXT1]#[nobold]  HSPLIT  ,#{?#{>=:#{client_width},120},#[fg=$CTP_GREEN]#[bold]<->#[fg=$CTP_SUBTEXT1]#[nobold]   ,#[fg=$CTP_SUBTEXT1] }}#{?#{>=:#{client_width},160},#[fg=$CTP_GREEN]#[bold]<x>#[fg=$CTP_SUBTEXT1]#[nobold]  CLOSE  ,#{?#{>=:#{client_width},120},#[fg=$CTP_GREEN]#[bold]<x>#[fg=$CTP_SUBTEXT1]#[nobold]   ,#[fg=$CTP_SUBTEXT1] }}#{?#{>=:#{client_width},120},#[fg=$CTP_SURFACE2]│ ,}#{?#{>=:#{client_width},160},#[fg=$CTP_MAUVE]#[bold]<s>#[fg=$CTP_SUBTEXT1]#[nobold]  SESSION  ,#{?#{>=:#{client_width},120},#[fg=$CTP_MAUVE]#[bold]<s>#[fg=$CTP_SUBTEXT1]#[nobold]   ,#[fg=$CTP_SUBTEXT1] }}#{?#{>=:#{client_width},160},#[fg=$CTP_MAUVE]#[bold]<d>#[fg=$CTP_SUBTEXT1]#[nobold]  DETACH  ,#{?#{>=:#{client_width},120},#[fg=$CTP_MAUVE]#[bold]<d>#[fg=$CTP_SUBTEXT1]#[nobold]   ,#[fg=$CTP_SUBTEXT1] }}#{?#{>=:#{client_width},120},#[fg=$CTP_SURFACE2]│ ,}#{?#{>=:#{client_width},160},#[fg=$CTP_BLUE]#[bold]Alt #[fg=$CTP_YELLOW]#[bold]↑↓←→#[fg=$CTP_SUBTEXT1]#[nobold] MOVE  ,#{?#{>=:#{client_width},120},#[fg=$CTP_BLUE]#[bold]Alt#[fg=$CTP_YELLOW]#[bold]↑↓←→ ,#[fg=$CTP_YELLOW]↑↓←→ }}#{?#{>=:#{client_width},160},#[fg=$CTP_PEACH]#[bold]<r>#[fg=$CTP_SUBTEXT1]#[nobold]  RELOAD  ,#{?#{>=:#{client_width},120},#[fg=$CTP_PEACH]#[bold]<r>#[fg=$CTP_SUBTEXT1]#[nobold]   ,#[fg=$CTP_SUBTEXT1] }}"

# -- ペインボーダー --
set -g pane-border-style "fg=$CTP_SURFACE1"
set -g pane-active-border-style "fg=$CTP_MAUVE"

# -- メッセージ --
set -g message-style "bg=$CTP_SURFACE0,fg=$CTP_MAUVE"
set -g message-command-style "bg=$CTP_SURFACE0,fg=$CTP_TEXT"

# -- コピーモードのハイライト --
set -g mode-style "bg=$CTP_SURFACE1,fg=$CTP_TEXT"