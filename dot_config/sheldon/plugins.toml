shell = "zsh"

[plugins]
[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[plugins.compinit]
# ロジック本体は ~/.config/zsh/compinit.zsh に分離 (sheldon inline + Tera +
# zsh の 3 言語混在を避け、zsh -n で構文チェックできるようにするため)
inline = "source ${XDG_CONFIG_HOME:-$HOME/.config}/zsh/compinit.zsh"

# mise completion は compdef を呼ぶので compinit の後ろ。
# mise 不在マシン (bootstrap 直後) でも shell が落ちないようガードする。
[plugins.mise-completion]
inline = "(( $+commands[mise] )) && source <(mise completion zsh)"

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"

# autosuggestions / syntax-highlighting は ZLE widget を wrap するので
# defer するとプロンプト表示後に「文字入力できるまでのラグ」が出る。
# これらだけ sync ロードする (起動への影響は無視できるレベル、実測で確認済)。
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"

[plugins.zsh-autosuggestions-ignore]
inline = "ZSH_AUTOSUGGEST_CLEAR_WIDGETS+=(bracketed-paste)"

[plugins.zsh-syntax-highlighting]
github = "zsh-users/zsh-syntax-highlighting"

[plugins.fzf]
inline = '''
if [[ $options[zle] = on ]]; then
  source <(fzf --zsh)
fi
'''

[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"
apply = ["defer"]

[plugins.eza-aliases]
inline = '''
alias eza="eza --icons=auto --git"
alias ls="eza"
alias ll="eza -l"
alias la="eza -a"
alias lt="eza --tree"
alias lla="eza -la"
'''

[plugins.bat-aliases]
inline = 'alias cat="bat --paging=never"'

[plugins.yazi]
inline = '''
y() {
  local tmp="$(mktemp -t "yazi-cwd.XXXXX")"
  yazi "$@" --cwd-file="$tmp"
  if cwd="$(<"$tmp")" && [ -n "$cwd" ] && [ "$cwd" != "$PWD" ]; then
    builtin cd -- "$cwd"
  fi
  rm -f -- "$tmp"
}
'''

[plugins.starship]
inline = 'eval "$(starship init zsh)"'

[plugins.atuin]
inline = '''
if [[ $options[zle] = on ]]; then
  eval "$(atuin init zsh --disable-up-arrow --disable-ctrl-r)"
fi
'''

# zoxide は chpwd hook を登録するので starship/atuin より後ろに置く
# (zoxide doctor の「最後で初期化せよ」警告を回避)
# --cmd cd は cd を zoxide 関数として再定義するので別途 alias cd=z は不要
[plugins.zoxide]
inline = '[[ "$CLAUDECODE" != "1" ]] && eval "$(zoxide init --cmd cd zsh)"'

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"
